    "numpy>=2.1.0",
    "scipy>=1.14.0",
    "librosa>=0.10.2",
    "SpeechRecognition>=3.10.4",
    "pyttsx3>=2.90",
    "pyaudio~=0.2.14",
    "openai-whisper>=20240930",
    "sounddevice>=0.5.0",
    "deepface>=0.0.92",
    "tf-keras==2.20.1",
