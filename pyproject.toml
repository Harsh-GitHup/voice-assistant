    "setuptools>=75.0.0",
    "fastapi==0.133.1",
    "uvicorn>=0.34.0",
    "pydantic-settings>=2.7.0",
    "openai>=1.60.0",
    "langchain-openai>=0.3.0",
    "langchain-google-genai>=2.0.0",
    "langchain-community>=0.3.0",
    "langsmith>=0.3.0",
